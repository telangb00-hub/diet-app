<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>운동 기록</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#74ebd5,#ACB6E5);
}

header {
    background:#2c3e50;
    color:white;
    padding:15px;
    text-align:center;
}

.container {
    width:420px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:15px;
}

input, button {
    width:100%;
    padding:12px;
    margin-top:8px;
    border-radius:8px;
    box-sizing:border-box;
}

button {
    border:none;
    color:white;
    font-weight:bold;
}

.add-btn { background:#27ae60; }
.timer-start { background:#2980b9; }
.timer-stop { background:#8e44ad; }
.back { background:#3498db; }

#timer {
    text-align:center;
    font-size:20px;
}

.toggle-container {
    margin-top:15px;
}

.exercise-group {
    margin-bottom:15px;
}

.toggle-btn {
    background:#34495e;
    margin:3px;
    padding:8px 12px;
    display:inline-block;
    width:auto;
}

.active {
    background:#27ae60;
}

.all-btn {
    background:#2ecc71;
    width:100%;
    margin-top:15px;
}

table {
    width:100%;
    margin-top:10px;
    border-collapse:collapse;
}

th {
    background:#2c3e50;
    color:white;
}

td, th {
    padding:8px;
    text-align:center;
    border-bottom:1px solid #ddd;
}

.delete-btn {
    background:#e74c3c;
    padding:5px;
}
</style>
</head>

<body>

<header>운동 기록</header>

<div class="container">

<h3 id="userTitle"></h3>

<input type="date" id="date">
<input type="text" id="exercise" placeholder="운동 이름">
<input type="number" id="weight" placeholder="무게">
<input type="number" id="reps" placeholder="횟수">

<div id="timer">0 초</div>

<button class="timer-start" onclick="startTimer()">타이머 시작</button>
<button class="timer-stop" onclick="stopTimer()">타이머 종료</button>

<button class="add-btn" onclick="addWorkout()">기록 추가</button>

<div class="toggle-container">
    <div id="exerciseBox" class="exercise-group"></div>
    <button class="toggle-btn all-btn" onclick="selectAll()">전체 보기</button>
</div>

<table>
<thead>
<tr>
<th>날짜</th><th>운동</th><th>무게</th><th>횟수</th><th>RM</th><th>시간</th><th>RM/s</th><th>삭제</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<button class="back" onclick="location.href='main.html'">메인으로</button>

</div>

<script>
const nickname = localStorage.getItem("currentNickname");
if (!nickname) location.href = "login.html";

document.getElementById("userTitle").innerText = nickname + "님의 운동";

const key = "workouts_" + localStorage.getItem("currentUser");
let workouts = JSON.parse(localStorage.getItem(key)) || [];

let selectedExercise = "전체";

let startTime = null;
let elapsed = 0;
let timerInterval = null;

function startTimer() {
    if (timerInterval) return;
    startTime = Date.now();
    timerInterval = setInterval(() => {
        elapsed = Math.floor((Date.now() - startTime) / 1000);
        document.getElementById("timer").innerText = elapsed + " 초";
    }, 1000);
}

function stopTimer() {
    clearInterval(timerInterval);
    timerInterval = null;
}

function selectAll() {
    selectedExercise = "전체";
    render();
    renderToggles();
}

function renderToggles() {
    const box = document.getElementById("exerciseBox");
    box.innerHTML = "";

    const unique = [...new Set(workouts.map(w => w.name))];

    unique.forEach(name => {
        const btn = document.createElement("button");
        btn.innerText = name;
        btn.className = "toggle-btn";

        if (name === selectedExercise) btn.classList.add("active");

        btn.onclick = () => {
            selectedExercise = name;
            render();
            renderToggles();
        };

        box.appendChild(btn);
    });
}

function render() {
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    let filtered = workouts;

    if (selectedExercise !== "전체") {
        filtered = workouts.filter(w => w.name === selectedExercise);
    }

    filtered.forEach((w, i) => {
        const row = document.createElement("tr");
        row.innerHTML = `
        <td>${w.date}</td>
        <td>${w.name}</td>
        <td>${w.weight}</td>
        <td>${w.reps}</td>
        <td>${w.rm}</td>
        <td>${w.time}</td>
        <td>${w.rps}</td>
        <td><button class="delete-btn" onclick="del(${i})">삭제</button></td>`;
        tbody.appendChild(row);
    });
}

function addWorkout() {
    const date = document.getElementById("date").value;
    const name = document.getElementById("exercise").value.trim();
    const weight = Number(document.getElementById("weight").value);
    const reps = Number(document.getElementById("reps").value);

    if (!date || !name || !weight || !reps || !elapsed) {
        alert("입력 및 타이머를 확인하세요.");
        return;
    }

    const rm = weight * reps;
    const rps = (rm / elapsed).toFixed(2);

    workouts.push({ date, name, weight, reps, rm, time: elapsed, rps });
    localStorage.setItem(key, JSON.stringify(workouts));

    elapsed = 0;
    document.getElementById("timer").innerText = "0 초";

    render();
    renderToggles();
}

function del(i) {
    workouts.splice(i, 1);
    localStorage.setItem(key, JSON.stringify(workouts));
    render();
    renderToggles();
}

document.getElementById("date").value = new Date().toISOString().split("T")[0];
render();
renderToggles();
</script>

</body>
</html>
