<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>운동 기록</title>

<style>

.help-btn {
    position: fixed;   /* 🔥 이게 핵심 */
    top: 15px;
    left: 15px;

    width: 28px;
    height: 28px;

    border-radius: 50%;
    background: rgba(0,0,0,0.5);

    color: white;
    font-size: 14px;
    font-weight: bold;

    display: flex;
    justify-content: center;
    align-items: center;

    z-index: 9999;
}

.help-box {
    position: fixed;   /* 🔥 이것도 */
    top: 55px;
    left: 15px;

    width: 240px;

    background: rgba(0,0,0,0.85);
    color: white;

    padding: 12px;
    border-radius: 10px;

    display: none;

    z-index: 9999;
}

body { margin:0; font-family:Arial; background:#111; color:white; }

.container {
    width:420px;
    margin:80px auto;
    background:#1c1c1c;
    padding:20px;
    border-radius:15px;
}

.days, .parts { display:flex; gap:5px; }
.days button, .parts button {
    flex:1; padding:10px; border:none; border-radius:8px;
    background:#333; color:white;
}
.days .active { background:#00c853; }
.parts .active { background:#ff9800; }

select, input {
    width:100%; padding:10px; margin-top:10px;
    border-radius:8px; border:none;
}

button { width:100%; margin-top:10px; padding:10px; border:none; border-radius:8px; color:white; }
.add-btn { background:#2196f3; }
.add-ex { background:#9c27b0; }
.status-btn { background:#ff9800; }
.back-btn { background:#555; }

.log {
    margin-top:20px;
    background:#222;
    padding:10px;
    border-radius:10px;
}
.delete-btn { background:#e74c3c; margin-top:5px; }
</style>
</head>

<body>

<button class="help-btn" onclick="toggleHelp()">?</button>

<div id="helpBox" class="help-box">
    임시 도움말입니다
</div>

<div class="container">

<h2>운동 기록</h2>

<div class="days" id="days"></div>
<div class="parts" id="parts"></div>

<select id="exerciseSelect">
<option>운동 선택</option>
</select>

<button class="add-ex" onclick="location.href='exercise_add.html'">운동 추가</button>

<input type="number" id="weight" placeholder="무게">
<input type="number" id="reps" placeholder="횟수">

<button class="add-btn" onclick="addSet()">세트 추가</button>

<button class="status-btn" onclick="goStatus()">📋 운동 현황</button>

<div class="log" id="log"></div>

<button class="back-btn" onclick="location.href='index.html'">메인으로</button>

</div>

<script>

function toggleHelp(){
    const box = document.getElementById("helpBox");
    box.style.display = box.style.display === "block" ? "none" : "block";
}

const daysList=["월","화","수","목","금"];
const partsArr=["가슴","등","하체","어깨","팔"];

let selectedDay="", selectedPart="";
const user = localStorage.getItem("currentUser");
let data = JSON.parse(localStorage.getItem("workout_"+user))||{};

daysList.forEach(d=>{
    let b=document.createElement("button");
    b.innerText=d;
    b.onclick=()=>{selectedDay=d; highlight("days",d); render();}
    days.appendChild(b);
});

partsArr.forEach(p=>{
    let b=document.createElement("button");
    b.innerText=p;
    b.onclick=()=>{selectedPart=p; highlight("parts",p); loadExercises(); render();}
    parts.appendChild(b);
});

function loadExercises(){
    exerciseSelect.innerHTML="<option>운동 선택</option>";
    let list=JSON.parse(localStorage.getItem("exercise_"+user))||[];
    list.forEach(e=>{
        if(e.part===selectedPart){
            let o=document.createElement("option");
            o.value=e.name; o.innerText=e.name;
            exerciseSelect.appendChild(o);
        }
    });
}

function addSet(){
    let w=+weight.value, r=+reps.value, ex=exerciseSelect.value;
    if(!selectedDay||!selectedPart||ex==="운동 선택") return;

    if(!data[selectedDay]) data[selectedDay]={};
    if(!data[selectedDay][selectedPart]) data[selectedDay][selectedPart]={};
    if(!data[selectedDay][selectedPart][ex]) data[selectedDay][selectedPart][ex]=[];

    data[selectedDay][selectedPart][ex].push({
        date:new Date().toISOString().slice(0,10),
        w,r
    });

    localStorage.setItem("workout_"+user, JSON.stringify(data));
    weight.value=""; reps.value="";
    render();
}

function render(){
    log.innerHTML="";
    let d=data[selectedDay]?.[selectedPart];
    if(!d) return;

    for(let ex in d){
        log.innerHTML+=`<h4>${ex}</h4>`;
        d[ex].forEach((s,i)=>{
            log.innerHTML+=`${s.w}kg x ${s.r}회`;
        });
    }
}

function highlight(type,val){
    document.querySelectorAll("."+type+" button").forEach(b=>{
        b.classList.toggle("active", b.innerText===val);
    });
}

function goStatus(){
    location.href="workout_status.html";
}
</script>

</body>
</html>
