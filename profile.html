<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>내 정보</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #89f7fe, #66a6ff);
}

/* 헤더 */
header {
    background: #2c3e50;
    color: white;
    text-align: center;
    padding: 16px;
    font-size: 22px;
    font-weight: bold;
}

/* 카드 */
.container {
    width: 460px;
    margin: 24px auto;
    background: white;
    border-radius: 16px;
    padding: 22px;
    box-shadow: 0 12px 28px rgba(0,0,0,0.15);
}

/* 제목 */
h3 {
    margin-top: 0;
    color: #2c3e50;
    font-size: 20px;
}

/* 입력 */
input, select, button {
    width: 100%;
    box-sizing: border-box;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: 1px solid #d0d7de;
    font-size: 14px;
}

input, select {
    background: #f8fafc;
}

input:focus, select:focus {
    border-color: #3498db;
    outline: none;
    box-shadow: 0 0 6px rgba(52,152,219,0.3);
}

/* 버튼 */
button {
    border: none;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.calc-btn { background: #3498db; }
.save-btn { background: #27ae60; }
.back-btn { background: #3498db; }

/* 섹션 타이틀 (🔥 핵심 수정) */
.box-title {
    display: block;
    width: 100%;
    text-align: center;
    background: #1f2b3d;
    color: white;
    padding: 12px;
    border-radius: 10px;
    margin-top: 20px;
    font-size: 16px;
}

/* 계산 카드 */
.metric-box {
    border: 1px solid #d6e4ff;
    background: #f1f7ff;
    border-radius: 12px;
    padding: 14px 0;
    margin-top: 12px;
    text-align: center;
}

.metric-label {
    font-size: 13px;
    color: #444;
}

.metric-value {
    margin-top: 6px;
    font-size: 26px;
    font-weight: bold;
}

.metric-unit {
    font-size: 15px;
    color: #555;
}

/* 목표 카드 */
.goal-card {
    border: 1px solid #cfe2ff;
    border-radius: 12px;
    padding: 16px;
    margin-top: 16px;
    text-align: center;
    background: #eaf4ff;
}

.goal-kcal {
    font-size: 38px;
    font-weight: bold;
}

/* 탭 */
.tabs, .ratio-tabs {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-top: 10px;
}

.tab-btn, .ratio-btn {
    background: #ecf0f1;
    color: #2c3e50;
}

.tab-btn.active {
    background: #2c3e50;
    color: white;
}

.ratio-btn.active {
    background: #34495e;
    color: white;
}

/* 매크로 */
.macro-row {
    border: 1px solid #e3e9ef;
    border-radius: 12px;
    padding: 16px 0;
    text-align: center;
    margin-top: 12px;
    background: #f8fafc;
}

.macro-gram {
    font-size: 34px;
    font-weight: bold;
}

/* 설명 */
.info-note {
    margin-top: 10px;
    padding: 10px;
    background: #f5f7fa;
    border-radius: 10px;
    font-size: 12px;
}

/* 현재 선택 */
.current-choice {
    margin-top: 14px;
    padding: 12px;
    border-radius: 10px;
    background: #eaf4ff;
    text-align: center;
    font-weight: bold;
}
</style>
</head>

<body>

<header>내 정보 / 권장 섭취량</header>

<div class="container">

<h3 id="title"></h3>

<input type="number" id="height" placeholder="키 (cm)">
<input type="number" id="weight" placeholder="몸무게 (kg)">
<input type="number" id="age" placeholder="나이">

<select id="gender">
<option value="male">남성</option>
<option value="female">여성</option>
</select>

<select id="activityLevel">
<option value="1.2">앉아있는 편</option>
<option value="1.3">보통</option>
<option value="1.4">활동적</option>
<option value="1.5">매우 활동적</option>
</select>

<select id="fitnessLevel">
<option value="평균" selected>평균</option>
<option value="좋음">좋음</option>
<option value="매우 좋음">매우 좋음</option>
</select>

<button class="calc-btn" onclick="calculate()">계산하기</button>

<div class="box-title">계산결과</div>

<div class="metric-box">
기초대사량: <span id="bmr">0</span> kcal
</div>

<div class="box-title">하루 권장 섭취량</div>

<div class="goal-card">
<span id="target">0</span> kcal
</div>

<button class="save-btn">저장</button>

<div class="current-choice">현재 저장된 목표 없음</div>

<button class="back-btn" onclick="location.href='index.html'">메인으로</button>

</div>

<script>
document.getElementById("title").innerText = "내 정보";

function calculate(){
    const w = document.getElementById("weight").value;
    const h = document.getElementById("height").value;
    const a = document.getElementById("age").value;

    const bmr = 10*w + 6.25*h - 5*a + 5;
    document.getElementById("bmr").innerText = Math.round(bmr);
    document.getElementById("target").innerText = Math.round(bmr*1.3);
}
</script>

</body>
</html>
