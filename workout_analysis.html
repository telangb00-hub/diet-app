<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>운동 분석</title>

<style>
*{box-sizing:border-box;}

.help-btn{
    position:fixed;
    top:15px;
    left:15px;
    width:28px;
    height:28px;
    border-radius:50%;
    background:rgba(0,0,0,0.5);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
}

.help-box{
    position:fixed;
    top:55px;
    left:15px;
    width:240px;
    background:rgba(0,0,0,0.85);
    color:white;
    padding:12px;
    border-radius:10px;
    display:none;
}

body{
    margin:0;
    min-height:100vh;
    font-family:Arial;
    background:url("https://images.unsplash.com/photo-1517960413843-0aee8e2b3285")
    no-repeat center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
}

body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.65);
}

.container{
    width:420px;
    padding:20px;
    border-radius:20px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(14px);
    color:white;
}

h2{text-align:center;}

select{
    width:100%;
    height:45px;
    margin-top:10px;
    border-radius:10px;
    border:none;
    padding:0 10px;
    background:rgba(255,255,255,0.15);
    color:white;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    color:white;
    font-weight:bold;
}

.analyze-btn{background:linear-gradient(135deg,#00e676,#00c853);}
.back-btn{background:linear-gradient(135deg,#42a5f5,#1565c0);}

.result{
    margin-top:15px;
    padding:12px;
    background:rgba(255,255,255,0.1);
    border-radius:10px;
}

.chart{margin-top:15px;}

.bar{
    height:18px;
    margin:8px 0;
    border-radius:10px;
    background:linear-gradient(135deg,#00e676,#00c853);
}
</style>
</head>

<body>

<button class="help-btn" onclick="toggleHelp()">?</button>
<div id="helpBox" class="help-box">운동 분석 도움말</div>

<div class="container">

<h2>📊 운동 분석</h2>

<select id="exerciseSelect">
<option>운동 선택</option>
</select>

<button class="analyze-btn" onclick="analyze()">분석하기</button>

<div class="result" id="result"></div>
<div class="chart" id="chart"></div>

<button class="back-btn" onclick="location.href='workout.html'">돌아가기</button>

</div>

<script>

function toggleHelp(){
    helpBox.style.display = helpBox.style.display==="block"?"none":"block";
}

const user = localStorage.getItem("currentUser");
if(!user) location.href="login.html";

/* 🔥 운동 목록 (운동관에서 추가된 것) */
function loadExercises(){
    const select = document.getElementById("exerciseSelect");
    const list = JSON.parse(localStorage.getItem("exercise_"+user)) || [];

    list.forEach(e=>{
        const opt = document.createElement("option");
        opt.value = e.name;
        opt.innerText = e.name;
        select.appendChild(opt);
    });
}
loadExercises();

/* 🔥 분석 */
function analyze(){

    const selected = document.getElementById("exerciseSelect").value;
    if(selected==="운동 선택") return;

    const workoutData = JSON.parse(localStorage.getItem("workout_"+user)) || {};

    let records = [];

    for(const day in workoutData){
        for(const part in workoutData[day]){
            for(const ex in workoutData[day][part]){
                if(ex === selected){
                    workoutData[day][part][ex].forEach(set=>{
                        records.push(set);
                    });
                }
            }
        }
    }

    if(records.length === 0){
        result.innerText = "데이터 없음";
        chart.innerHTML="";
        return;
    }

    /* 🔥 볼륨 계산 */
    let volumes = records.map(r => r.w * r.r);

    result.innerText = "총 세트: " + records.length;

    chart.innerHTML="";
    const max = Math.max(...volumes);

    volumes.forEach(v=>{
        chart.innerHTML += `
        <div class="bar" style="width:${(v/max)*100}%">
        </div>`;
    });
}

</script>

</body>
</html>
