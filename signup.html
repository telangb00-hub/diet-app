<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>회원가입</title>

<style>
body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #a1c4fd, #c2e9fb);
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
}

form {
    width: 320px;
    padding: 30px 25px;
    background: white;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

.check-btn { background: #f39c12; }
.signup-btn { background: #3498db; }
.back-btn { background: #7f8c8d; }

.msg {
    font-size: 13px;
    margin-top: 6px;
}
.success { color: green; }
.error { color: red; }
</style>
</head>

<body>

<form id="signupForm">
    <h2>회원가입</h2>

    <input type="text" id="username" placeholder="아이디">
    <button type="button" class="check-btn" onclick="checkId()">아이디 중복 확인</button>
    <div id="checkMsg" class="msg"></div>

    <input type="password" id="password" placeholder="비밀번호">
    <input type="text" id="nickname" placeholder="닉네임">

    <button type="submit" class="signup-btn">가입하기</button>
    <button type="button" class="back-btn" onclick="goLogin()">로그인으로</button>
</form>

<script>
document.addEventListener("DOMContentLoaded", function () {

    let isChecked = false; // 중복확인 여부

    // 🔥 아이디 중복 확인
    function checkId() {
        const username = document.getElementById("username").value.trim();
        const msg = document.getElementById("checkMsg");

        let users = JSON.parse(localStorage.getItem("users")) || {};

        if (!username) {
            msg.innerText = "아이디를 입력하세요.";
            msg.className = "msg error";
            isChecked = false;
            return;
        }

        if (users[username]) {
            msg.innerText = "이미 사용 중인 아이디입니다.";
            msg.className = "msg error";
            isChecked = false;
        } else {
            msg.innerText = "사용 가능한 아이디입니다.";
            msg.className = "msg success";
            isChecked = true;
        }
    }

    // 🔥 회원가입 처리
    const form = document.getElementById("signupForm");

    form.addEventListener("submit", function(e) {
        e.preventDefault();

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const nickname = document.getElementById("nickname").value.trim();

        let users = JSON.parse(localStorage.getItem("users")) || {};

        if (!username || !password || !nickname) {
            alert("모든 값을 입력하세요.");
            return;
        }

        if (!isChecked) {
            alert("아이디 중복 확인을 해주세요.");
            return;
        }

        if (users[username]) {
            alert("이미 존재하는 아이디입니다.");
            return;
        }

        users[username] = {
            password: password,
            nickname: nickname
        };

        localStorage.setItem("users", JSON.stringify(users));

        alert("회원가입 완료!");
        location.href = "login.html";
    });

    // 🔥 로그인 이동
    function goLogin() {
        window.location.href = "login.html";
    }

    window.goLogin = goLogin;
    window.checkId = checkId;

});
</script>

</body>
</html>
