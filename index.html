<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>메인</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;

    /* 🔥 운동 느낌 배경 */
    background: url("https://images.unsplash.com/photo-1517836357463-d25dfeac3438")
    no-repeat center/cover;

    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* 🔥 어둡게 덮기 */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

/* 🔥 카드 */
.container {
    position: relative;
    width: 360px;
    padding: 30px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(14px);
    border-radius: 18px;
    color: white;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);

    animation: fadeUp 0.7s ease;
}

/* 제목 */
h1 {
    margin-bottom: 25px;
}

/* 버튼 */
button {
    width: 100%;
    padding: 14px;
    margin-top: 10px;
    font-size: 15px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    font-weight: bold;
    color: white;
    transition: 0.2s;
}

/* 색상 */
.workout { background: #27ae60; }
.diet { background: #e67e22; }
.profile { background: #3498db; }
.calcinfo { background: #8e44ad; }
.logout { background: #e74c3c; }

/* hover */
button:hover {
    transform: translateY(-3px);
}

/* 하단 안내 */
.guide-box {
    position: absolute;
    bottom: -60px;
    width: 100%;
    font-size: 13px;
    color: #eee;
}

.guide-box b {
    color: #f1c40f;
}

/* 애니메이션 */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(25px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<div class="container">
    <h1 id="title"></h1>

    <button class="workout" onclick="location.href='workout.html'">
        운동 기록 (공사중)
    </button>

    <button class="diet" onclick="location.href='diet.html'">
        식단 관리
    </button>

    <button class="profile" onclick="location.href='profile.html'">
        내 정보
    </button>

    <button class="calcinfo" onclick="location.href='calculation_info.html'">
        계산식 안내
    </button>

    <button class="logout" onclick="logout()">
        로그아웃
    </button>

    <!-- 안내 -->
    <div class="guide-box">
        📌 먼저 <b>내 정보</b>를 입력하세요
    </div>
</div>

<script>
const nickname = localStorage.getItem("currentNickname");

if (!nickname) {
    location.href = "login.html";
}

document.getElementById("title").innerText = nickname + "님 환영합니다";

function logout() {
    localStorage.removeItem("currentUser");
    localStorage.removeItem("currentNickname");
    location.href = "login.html";
}
</script>

</body>
</html>
