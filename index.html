<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>메인</title>

<style>

.help-btn {
    position: fixed;   /* 🔥 이게 핵심 */
    top: 15px;
    left: 15px;

    width: 28px;
    height: 28px;

    border-radius: 50%;
    background: rgba(0,0,0,0.5);

    color: white;
    font-size: 14px;
    font-weight: bold;

    display: flex;
    justify-content: center;
    align-items: center;

    z-index: 9999;
}

.help-box {
    position: fixed;   /* 🔥 이것도 */
    top: 55px;
    left: 15px;

    width: 240px;

    background: rgba(0,0,0,0.85);
    color: white;

    padding: 12px;
    border-radius: 10px;

    display: none;

    z-index: 9999;
}

body {
    margin:0;
    min-height:100vh;
    font-family:Arial;

    background: url("https://images.unsplash.com/photo-1517836357463-d25dfeac3438")
    no-repeat center/cover;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* 오버레이 */
body::before {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.65);
}

/* 카드 */
.container {
    position:relative;
    z-index:1;

    width:360px;
    padding:30px;

    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(14px);

    border-radius:20px;
    color:white;
    text-align:center;

    box-shadow:0 20px 40px rgba(0,0,0,0.5);
}

/* 버튼 */
button {
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:14px;
    color:white;
    font-weight:bold;
}

/* 버튼 색 */
.exercise{background:linear-gradient(135deg,#00c6ff,#0072ff);}
.workout{background:linear-gradient(135deg,#00e676,#00c853);}
.diet{background:linear-gradient(135deg,#ffb74d,#f57c00);}
.profile{background:linear-gradient(135deg,#42a5f5,#1565c0);}
.calcinfo{background:linear-gradient(135deg,#ab47bc,#6a1b9a);}
.logout{background:linear-gradient(135deg,#ef5350,#b71c1c);}


</style>
</head>

<body>

<button class="help-btn" onclick="toggleHelp()">?</button>

<div id="helpBox" class="help-box">
    임시 도움말입니다
</div>

<div class="container">
<h2 id="title"></h2>
<button class="exercise" onclick="location.href='exercise/exercise_library.html'">🏋️ 운동관</button>
<button class="workout" onclick="location.href='workout.html'">운동 기록(수정중)</button>
<button class="diet" onclick="location.href='diet.html'">식단 관리</button>
<button class="profile" onclick="location.href='profile.html'">내 정보</button>
<button class="calcinfo" onclick="location.href='calculation_info.html'">계산식 안내</button>
<button class="logout" onclick="logout()">로그아웃</button>

<p style="margin-top:15px;font-size:13px;">
📌 왼쪽 상단 도움말 버튼 클릭
</p>
</div>

<script>

function toggleHelp(){
    const box = document.getElementById("helpBox");
    box.style.display = box.style.display === "block" ? "none" : "block";
}

const n = localStorage.getItem("currentNickname");
if(!n) location.href = "login.html";

title.innerText = n + "님 환영합니다";

function toggleHelp(){
    const box = document.getElementById("helpBox");
    box.style.display = box.style.display === "block" ? "none" : "block";
}

function logout(){
    localStorage.removeItem("currentUser");
    localStorage.removeItem("currentNickname");
    location.href = "login.html";
}
</script>

</body>
</html>
