<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>메인</title>

<style>
body {
    margin:0;
    min-height:100vh;
    font-family:Arial;

    /* 🔥 헬스앱 배경 */
    background: url("https://images.unsplash.com/photo-1517836357463-d25dfeac3438")
    no-repeat center/cover;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* 🔥 어두운 오버레이 */
body::before {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.65);
}

/* 카드 */
.container {
    position:relative;
    z-index:1;

    width:360px;
    padding:30px;

    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(14px);

    border-radius:20px;
    color:white;
    text-align:center;

    box-shadow:0 20px 40px rgba(0,0,0,0.5);
    animation: fadeUp 0.8s ease;
}

/* 버튼 */
button {
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:14px;
    color:white;
    font-weight:bold;
    transition:0.25s;
}

/* 🔥 헬스앱 느낌 컬러 */
.workout{background:linear-gradient(135deg,#00e676,#00c853);}
.diet{background:linear-gradient(135deg,#ffb74d,#f57c00);}
.profile{background:linear-gradient(135deg,#42a5f5,#1565c0);}
.calcinfo{background:linear-gradient(135deg,#ab47bc,#6a1b9a);}
.logout{background:linear-gradient(135deg,#ef5350,#b71c1c);}

button:hover{
    transform:translateY(-4px) scale(1.02);
    box-shadow:0 8px 20px rgba(0,0,0,0.4);
}

/* 애니메이션 */
@keyframes fadeUp {
    from {opacity:0; transform:translateY(30px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
<h2 id="title"></h2>

<button class="workout" onclick="location.href='workout.html'">운동 기록(공사중)</button>
<button class="diet" onclick="location.href='diet.html'">식단 관리(수정중)</button>
<button class="profile" onclick="location.href='profile.html'">내 정보</button>
<button class="calcinfo" onclick="location.href='calculation_info.html'">계산식 안내</button>
<button class="logout" onclick="logout()">로그아웃</button>

<p style="margin-top:15px;font-size:13px;">
📌 먼저 <b>내 정보</b>를 입력하세요 <br>
📌 왼쪽 위 도움말 있습니다.
</p>
</div>

<script>
const n = localStorage.getItem("currentNickname");
if(!n) location.href = "login.html";

title.innerText = n + "님 환영합니다";

function logout(){
    localStorage.removeItem("currentUser");
    localStorage.removeItem("currentNickname");
    location.href = "login.html";
}
</script>

</body>
</html>
