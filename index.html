<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>메인</title>

<style>
body {
    margin: 0;
    height:100vh;
    font-family: Arial;

    background: url("https://images.unsplash.com/photo-1517836357463-d25dfeac3438")
    no-repeat center/cover;

    display:flex;
    justify-content:center;
    align-items:center;
}

body::before {
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

.container {
    position:relative;
    width:360px;
    padding:30px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(14px);
    border-radius:18px;
    color:white;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

button {
    width:100%;
    padding:14px;
    margin-top:12px;
    border:none;
    border-radius:12px;
    color:white;
    font-weight:bold;
}

.workout{background:#27ae60;}
.diet{background:#e67e22;}
.profile{background:#3498db;}
.calcinfo{background:#8e44ad;}
.logout{background:#e74c3c;}

button:hover{transform:translateY(-3px);}
</style>
</head>

<body>

<div class="container">
<h2 id="title"></h2>

<button class="workout" onclick="location.href='workout.html'">운동 기록</button>
<button class="diet" onclick="location.href='diet.html'">식단 관리</button>
<button class="profile" onclick="location.href='profile.html'">내 정보</button>
<button class="calcinfo" onclick="location.href='calculation_info.html'">계산식 안내</button>
<button class="logout" onclick="logout()">로그아웃</button>

<p style="margin-top:15px;font-size:13px;">
📌 먼저 <b>내 정보</b>를 입력하세요
</p>
</div>

<script>
const n=localStorage.getItem("currentNickname");
if(!n) location.href="login.html";
title.innerText=n+"님 환영합니다";

function logout(){
localStorage.clear();
location.href="login.html";
}
</script>

</body>
</html>
