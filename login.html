<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로그인</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: Arial;

    background: url("https://images.unsplash.com/photo-1558611848-73f7eb4001a1")
    no-repeat center/cover;

    display: flex;
    justify-content: center;
    align-items: center;
}

body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.65);
}

/* 🔥 카드 크기 통일 */
form {
    position: relative;
    width: 360px;
    padding: 30px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(14px);
    border-radius: 18px;
    color: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    animation: fadeUp 0.8s ease;
}

h2 { text-align:center; }

input, button {
    width: 100%;
    padding: 13px;
    margin-top: 12px;
    border-radius: 10px;
    border: none;
}

.login-btn { background:#27ae60; }
.signup-btn { background:#3498db; }
.delete-btn { background:#e74c3c; }

button:hover { transform:scale(1.05); }

@keyframes fadeUp {
    from {opacity:0; transform:translateY(30px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<form id="loginForm">
<h2>로그인</h2>

<input id="username" placeholder="아이디">
<input type="password" id="password" placeholder="비밀번호">

<button class="login-btn">로그인</button>
<button type="button" class="signup-btn" onclick="location.href='signup.html'">회원가입</button>

<hr>

<h3>회원 삭제</h3>
<input id="deleteUserId" placeholder="삭제할 아이디">
<button type="button" class="delete-btn" onclick="deleteUser()">회원 삭제</button>
</form>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
e.preventDefault();

const u=username.value.trim();
const p=password.value.trim();
const users=JSON.parse(localStorage.getItem("users"))||{};

if(!users[u]||users[u].password!==p){alert("로그인 실패");return;}

localStorage.setItem("currentUser",u);
localStorage.setItem("currentNickname",users[u].nickname||u);

location.href="index.html";
});

function deleteUser(){
const u=deleteUserId.value.trim();
let users=JSON.parse(localStorage.getItem("users"))||{};
delete users[u];
localStorage.setItem("users",JSON.stringify(users));
deleteUserId.value="";
alert("삭제 완료");
}
</script>

</body>
</html>
