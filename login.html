<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로그인</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: Arial, sans-serif;

    background: url("https://images.unsplash.com/photo-1558611848-73f7eb4001a1")
    no-repeat center/cover;

    display: flex;
    justify-content: center;
    align-items: center;
}

body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.65);
}

/* 카드 */
form {
    position: relative;
    width: 360px;
    padding: 30px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(14px);
    border-radius: 18px;
    color: white;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    animation: fadeUp 0.8s ease;
}

h2 {
    text-align: center;
    margin-bottom: 15px;
}

/* 🔥 입력/버튼 정렬 통일 */
input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    box-sizing: border-box;
}

/* 버튼 */
button {
    font-weight: bold;
    color: white;
    cursor: pointer;
    transition: 0.2s;
}

.login-btn { background: #27ae60; }
.signup-btn { background: #3498db; }
.delete-btn { background: #e74c3c; }

button:hover {
    transform: scale(1.05);
}

hr {
    margin: 18px 0;
    border: none;
    border-top: 1px solid rgba(255,255,255,0.3);
}

/* 애니메이션 */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<form id="loginForm">
    <h2>로그인</h2>

    <input type="text" id="username" placeholder="아이디">
    <input type="password" id="password" placeholder="비밀번호">

    <button type="submit" class="login-btn">로그인</button>
    <button type="button" class="signup-btn" onclick="goSignup()">회원가입</button>

    <hr>

    <h3>회원 삭제</h3>
    <input type="text" id="deleteUserId" placeholder="삭제할 아이디">
    <button type="button" class="delete-btn" onclick="deleteUser()">회원 삭제</button>
</form>

<script>
document.addEventListener("DOMContentLoaded", function () {

    function goSignup() {
        window.location.href = "./signup.html";
    }
    window.goSignup = goSignup;

    const form = document.getElementById("loginForm");

    if (form) {
        form.addEventListener("submit", function(e) {
            e.preventDefault();

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value.trim();
            const users = JSON.parse(localStorage.getItem("users")) || {};

            if (!username || !password) {
                alert("아이디와 비밀번호를 입력하세요.");
                return;
            }

            if (!users[username]) {
                alert("존재하지 않는 계정입니다.");
                return;
            }

            if (users[username].password !== password) {
                alert("비밀번호를 확인해주세요.");
                return;
            }

            localStorage.setItem("currentUser", username);
            localStorage.setItem(
                "currentNickname",
                users[username].nickname || username
            );

            alert("로그인 성공!");
            location.href = "index.html";
        });
    }

    function deleteUser() {
        const input = document.getElementById("deleteUserId");
        const username = input.value.trim();

        let users = JSON.parse(localStorage.getItem("users")) || {};

        if (!username) {
            alert("삭제할 아이디를 입력하세요.");
            return;
        }

        if (!users[username]) {
            alert("존재하지 않는 계정입니다.");
            return;
        }

        delete users[username];
        localStorage.setItem("users", JSON.stringify(users));

        localStorage.removeItem("workouts_" + username);
        localStorage.removeItem("diet_" + username);
        localStorage.removeItem("profile_" + username);
        localStorage.removeItem("goal_" + username);

        if (localStorage.getItem("currentUser") === username) {
            localStorage.removeItem("currentUser");
            localStorage.removeItem("currentNickname");
        }

        alert("회원 삭제 완료");
        input.value = "";
    }

    window.deleteUser = deleteUser;

});
</script>

</body>
</html>
