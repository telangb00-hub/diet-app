<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>로그인</title>

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: Arial, sans-serif;

    background: url("https://images.unsplash.com/photo-1558611848-73f7eb4001a1")
    no-repeat center/cover;

    display: flex;
    justify-content: center;
    align-items: center;
}

body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.65);
}

form {
    position: relative;
    width: 320px;
    padding: 30px 25px;
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(14px);
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    color: white;

    animation: fadeUp 0.8s ease;
}

h2 {
    margin-bottom: 20px;
    text-align: center;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border: none;
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}

.login-btn { background: #4CAF50; }
.signup-btn { background: #3498db; }
.delete-btn { background: #e74c3c; }

button:hover {
    transform: translateY(-2px);
    opacity: 0.9;
}

hr {
    margin: 20px 0;
    border: none;
    border-top: 1px solid rgba(255,255,255,0.3);
}

h3 {
    margin-bottom: 5px;
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>
<body>
<!-- 그대로 유지 -->
