<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>식단 관리</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#fbc2eb,#a6c1ee);
}
header {
    background: #2c3e50;
    color: white;
    padding: 15px;
    text-align: center;
}
.container {
    width: 460px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 10px 24px rgba(0,0,0,0.12);
}
input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    box-sizing: border-box;
}
button {
    border: none;
    color: white;
    font-weight: bold;
    cursor: pointer;
}
.add-btn { background: #27ae60; }
.search-btn { background: #8e44ad; }
.back-btn { background: #3498db; }

.favorite-btn { background: #f39c12; }

.small-btn {
    background: #e74c3c;
    padding: 4px 7px;
    border-radius: 6px;
    margin-left: 6px;
}

#favoritesList button {
    width: auto;
    margin-right: 5px;
}
</style>
</head>

<body>

<header>식단 관리</header>

<div class="container">
    <h3 id="userTitle"></h3>

    <input type="date" id="date">

    <input type="number" id="carb" placeholder="탄수화물 (g)">
    <input type="number" id="protein" placeholder="단백질 (g)">
    <input type="number" id="fat" placeholder="지방 (g)">

    <button class="search-btn" onclick="goSearch()">음식 검색</button>
    <button class="add-btn" onclick="addDiet()">기록 추가</button>

    <!-- ⭐ 즐겨찾기 -->
    <h4>⭐ 즐겨찾기</h4>
    <div id="favoritesList"></div>
    <button class="favorite-btn" onclick="saveFavorite()">즐겨찾기 저장</button>

    <table>
        <thead>
            <tr>
                <th>날짜</th>
                <th>kcal</th>
                <th>탄</th>
                <th>단</th>
                <th>지</th>
                <th>삭제</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <button class="back-btn" onclick="location.href='index.html'">메인</button>
</div>

<script>
const currentUser = localStorage.getItem("currentUser");
if (!currentUser) location.href = "login.html";

const nickname = localStorage.getItem("currentNickname") || currentUser;
document.getElementById("userTitle").innerText = nickname + "님의 식단";

const dietKey = "diet_" + currentUser;
const favKey = "favorites_" + currentUser;

let diets = JSON.parse(localStorage.getItem(dietKey)) || [];
let favorites = JSON.parse(localStorage.getItem(favKey)) || [];

const today = new Date().toISOString().split("T")[0];
document.getElementById("date").value = today;

// 음식 검색
function goSearch() {
    window.open("https://www.pillyze.com/", "_blank");
}

// 식단 추가
function addDiet() {
    const date = document.getElementById("date").value;
    const carb = Number(document.getElementById("carb").value) || 0;
    const protein = Number(document.getElementById("protein").value) || 0;
    const fat = Number(document.getElementById("fat").value) || 0;

    const kcal = carb*4 + protein*4 + fat*9;

    diets.push({ date, carb, protein, fat, kcal });
    localStorage.setItem(dietKey, JSON.stringify(diets));

    document.getElementById("carb").value = "";
    document.getElementById("protein").value = "";
    document.getElementById("fat").value = "";

    render();
}

// 삭제
function del(i) {
    diets.splice(i,1);
    localStorage.setItem(dietKey, JSON.stringify(diets));
    render();
}

// 즐겨찾기 저장
function saveFavorite() {
    const carb = Number(document.getElementById("carb").value) || 0;
    const protein = Number(document.getElementById("protein").value) || 0;
    const fat = Number(document.getElementById("fat").value) || 0;

    if (carb===0 && protein===0 && fat===0) {
        alert("값 입력");
        return;
    }

    favorites.push({ carb, protein, fat });
    localStorage.setItem(favKey, JSON.stringify(favorites));

    renderFavorites();
}

// 즐겨찾기 출력
function renderFavorites() {
    const div = document.getElementById("favoritesList");
    div.innerHTML = "";

    favorites.forEach((f,i)=>{
        const btn = document.createElement("button");
        btn.innerText = `탄:${f.carb} 단:${f.protein} 지:${f.fat}`;
        btn.onclick = ()=>{
            document.getElementById("carb").value = f.carb;
            document.getElementById("protein").value = f.protein;
            document.getElementById("fat").value = f.fat;
        };

        const delBtn = document.createElement("button");
        delBtn.innerText = "X";
        delBtn.className = "small-btn";
        delBtn.onclick = ()=>{
            favorites.splice(i,1);
            localStorage.setItem(favKey, JSON.stringify(favorites));
            renderFavorites();
        };

        const wrap = document.createElement("div");
        wrap.appendChild(btn);
        wrap.appendChild(delBtn);

        div.appendChild(wrap);
    });
}

// 렌더
function render() {
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    diets.forEach((d,i)=>{
        const row = document.createElement("tr");
        row.innerHTML = `
            <td>${d.date}</td>
            <td>${d.kcal}</td>
            <td>${d.carb}</td>
            <td>${d.protein}</td>
            <td>${d.fat}</td>
            <td><button onclick="del(${i})">X</button></td>
        `;
        tbody.appendChild(row);
    });
}

render();
renderFavorites();
</script>

</body>
</html>
