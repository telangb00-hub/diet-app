<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>즐겨찾기</title>

<style>
body {
    margin:0;
    height:100vh;
    font-family:Arial;

    background: url("https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b")
    no-repeat center/cover;

    display:flex;
    justify-content:center;
    align-items:center;
}

body::before {
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
}

/* 카드 */
.container {
    position:relative;
    width:360px;
    padding:30px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(14px);
    border-radius:18px;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);

    display:flex;
    flex-direction:column;
}

/* 🔥 완벽 정렬 */
input,button{
    width:100%;
    padding:13px;
    margin-top:12px;
    border-radius:10px;
    border:none;
    box-sizing:border-box;
}

.save{background:#27ae60;}
.back{background:#3498db;}

button:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="container">
<h2>즐겨찾기 등록</h2>

<input id="name" placeholder="음식 이름">
<input id="carb" type="number" placeholder="탄수화물 (g)">
<input id="protein" type="number" placeholder="단백질 (g)">
<input id="fat" type="number" placeholder="지방 (g)">

<button class="save" onclick="save()">저장</button>
<button class="back" onclick="location.href='diet.html'">돌아가기</button>
</div>

<script>
const user = localStorage.getItem("currentUser");
if(!user) location.href="login.html";

function save(){

    const nameInput = document.getElementById("name");
    const carbInput = document.getElementById("carb");
    const proteinInput = document.getElementById("protein");
    const fatInput = document.getElementById("fat");

    const name = nameInput.value.trim();
    const carb = Number(carbInput.value) || 0;
    const protein = Number(proteinInput.value) || 0;
    const fat = Number(fatInput.value) || 0;

    // 🔥 입력 검증
    if(!name){
        alert("음식 이름을 입력하세요.");
        return;
    }

    let list;
    try{
        list = JSON.parse(localStorage.getItem("favorites_"+user));
        if(!list || !Array.isArray(list)) list = [];
    }catch(e){
        list = [];
    }

    list.push({
        name,
        carb,
        protein,
        fat
    });

    localStorage.setItem("favorites_"+user, JSON.stringify(list));

    alert("저장됨");

    // 초기화
    nameInput.value="";
    carbInput.value="";
    proteinInput.value="";
    fatInput.value="";
}
</script>

</body>
</html>
