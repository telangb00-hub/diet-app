<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>즐겨찾기</title>

<style>
body {
    margin:0;
    height:100vh;
    font-family:Arial;

    background: linear-gradient(135deg,#000000,#434343);

    display:flex;
    justify-content:center;
    align-items:center;
}

.container {
    width:360px;
    padding:30px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    border-radius:20px;
    color:white;
    box-shadow:0 20px 40px rgba(0,0,0,0.6);

    animation: fadeUp 0.6s ease;
}

button {
    transition:0.2s;
}

button:hover {
    transform:scale(1.05);
}

@keyframes fadeUp {
    from {opacity:0; transform:translateY(30px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="container">
<h2>즐겨찾기 등록</h2>

<input id="name" placeholder="음식 이름">
<input id="carb" type="number" placeholder="탄수화물">
<input id="protein" type="number" placeholder="단백질">
<input id="fat" type="number" placeholder="지방">

<button class="save" onclick="save()">저장</button>
<button class="back" onclick="location.href='diet.html'">돌아가기</button>
</div>

<script>
const user=localStorage.getItem("currentUser");

function save(){
let list=JSON.parse(localStorage.getItem("favorites_"+user))||[];

list.push({
name:name.value,
carb:+carb.value,
protein:+protein.value,
fat:+fat.value
});

localStorage.setItem("favorites_"+user,JSON.stringify(list));

alert("저장됨");
name.value="";carb.value="";protein.value="";fat.value="";
}
</script>

</body>
</html>
