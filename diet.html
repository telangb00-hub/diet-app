<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>식단 관리</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#fbc2eb,#a6c1ee);
}
header {
    background:#2c3e50;
    color:white;
    padding:15px;
    text-align:center;
}

.container {
    width:500px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 10px 24px rgba(0,0,0,0.12);
}

input, button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    box-sizing:border-box;
}

button {
    border:none;
    color:white;
    font-weight:bold;
}

.add-btn { background:#27ae60; }
.search-btn { background:#8e44ad; }
.favorite-btn { background:#f39c12; }
.back-btn { background:#3498db; }

h4 { margin-top:15px; }

/* 🔥 진행률 */
.progress-bar {
    width:100%;
    height:18px;
    background:#eee;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:10px;
}
.progress-fill {
    height:100%;
    width:0%;
}
.kcal { background:#34495e; }
.carb { background:#3498db; }
.protein { background:#2ecc71; }
.fat { background:#e74c3c; }

/* 🔥 테이블 */
table {
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}
th {
    background:#2c3e50;
    color:white;
}
td, th {
    padding:10px;
    text-align:center;
    border-bottom:1px solid #ddd;
}
.small-btn {
    background:#e74c3c;
    padding:5px 8px;
    border-radius:6px;
}

</style>
</head>

<body>

<header>식단 관리</header>

<div class="container">

<h3 id="userTitle"></h3>

<input type="date" id="date">

<input type="number" id="carb" placeholder="탄수화물 (g)">
<input type="number" id="protein" placeholder="단백질 (g)">
<input type="number" id="fat" placeholder="지방 (g)">

<div id="kcalPreview"></div>

<button class="add-btn" onclick="addDiet()">기록 추가</button>
<button class="favorite-btn" onclick="location.href='favorite.html'">즐겨찾기 등록</button>

<!-- 🔥 진행률 -->
<h4>📊 섭취 진행률</h4>

<div id="kcalText"></div>
<div class="progress-bar"><div id="kcalFill" class="progress-fill kcal"></div></div>

<div id="carbText"></div>
<div class="progress-bar"><div id="carbFill" class="progress-fill carb"></div></div>

<div id="proteinText"></div>
<div class="progress-bar"><div id="proteinFill" class="progress-fill protein"></div></div>

<div id="fatText"></div>
<div class="progress-bar"><div id="fatFill" class="progress-fill fat"></div></div>

<!-- 즐겨찾기 -->
<h4>⭐ 즐겨찾기</h4>
<div id="favoritesList"></div>

<!-- 테이블 -->
<table>
<thead>
<tr>
<th>날짜</th>
<th>kcal</th>
<th>탄</th>
<th>단</th>
<th>지</th>
<th>삭제</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<button class="back-btn" onclick="location.href='index.html'">메인</button>

</div>

<script>
const user = localStorage.getItem("currentUser");
if(!user) location.href="login.html";

const goal = JSON.parse(localStorage.getItem("goal_"+user));

let diets = JSON.parse(localStorage.getItem("diet_"+user)) || [];
let favorites = JSON.parse(localStorage.getItem("favorites_"+user)) || [];

document.getElementById("userTitle").innerText = user+"님의 식단";

function addDiet(){
    const date = document.getElementById("date").value;
    const carb = +document.getElementById("carb").value||0;
    const protein = +document.getElementById("protein").value||0;
    const fat = +document.getElementById("fat").value||0;

    const kcal = carb*4 + protein*4 + fat*9;

    diets.push({date, carb, protein, fat, kcal});
    localStorage.setItem("diet_"+user, JSON.stringify(diets));

    render();
}

function render(){
    const tbody = document.getElementById("tbody");
    tbody.innerHTML="";

    let totalKcal=0, totalCarb=0, totalProtein=0, totalFat=0;

    diets.forEach((d,i)=>{
        totalKcal+=d.kcal;
        totalCarb+=d.carb;
        totalProtein+=d.protein;
        totalFat+=d.fat;

        tbody.innerHTML+=`
        <tr>
        <td>${d.date}</td>
        <td>${d.kcal}</td>
        <td>${d.carb}</td>
        <td>${d.protein}</td>
        <td>${d.fat}</td>
        <td><button class="small-btn" onclick="del(${i})">X</button></td>
        </tr>`;
    });

    updateProgress(totalKcal,totalCarb,totalProtein,totalFat);
    renderFavorites();
}

function del(i){
    diets.splice(i,1);
    localStorage.setItem("diet_"+user, JSON.stringify(diets));
    render();
}

function updateProgress(kcal, carb, protein, fat){
    if(!goal) return;

    setBar("kcal",kcal,goal.targetKcal);
    setBar("carb",carb,goal.carb);
    setBar("protein",protein,goal.protein);
    setBar("fat",fat,goal.fat);
}

function setBar(type, current, target){
    const fill=document.getElementById(type+"Fill");
    const text=document.getElementById(type+"Text");

    let percent = target? (current/target*100):0;

    fill.style.width=Math.min(percent,100)+"%";
    text.innerText=`${type} : ${current}/${target} (${Math.round(percent)}%)`;
}

function renderFavorites(){
    const div=document.getElementById("favoritesList");
    div.innerHTML="";

    favorites.forEach((f,i)=>{
        const btn=document.createElement("button");
        btn.innerText=f.name;

        btn.onclick=()=>{
            carb.value=f.carb;
            protein.value=f.protein;
            fat.value=f.fat;
        };

        div.appendChild(btn);
    });
}

render();
</script>

</body>
</html>
