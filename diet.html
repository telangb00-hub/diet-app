<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>식단 관리</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#fbc2eb,#a6c1ee);
}
header {
    background: #2c3e50;
    color: white;
    padding: 15px;
    text-align: center;
}
.container {
    width: 460px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 10px 24px rgba(0,0,0,0.12);
}
input, button {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    box-sizing: border-box;
    border: 1px solid #d0d7de;
}
button {
    border: none;
    color: white;
    font-weight: bold;
    cursor: pointer;
}
.add-btn { background: #27ae60; }
.search-btn { background: #8e44ad; }
.back-btn { background: #3498db; }

.summary-card {
    margin-top: 16px;
    padding: 14px;
    border-radius: 12px;
    background: #f8fafc;
    border: 1px solid #dfe6e9;
}
.summary-title {
    font-weight: bold;
    color: #2c3e50;
    margin-bottom: 8px;
}
.summary-line {
    font-size: 14px;
    color: #444;
    margin-top: 4px;
}
.today-kcal {
    margin-top: 12px;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
    color: #2c3e50;
}

.progress-area {
    margin-top: 18px;
}
.progress-label {
    font-size: 13px;
    color: #333;
    margin-bottom: 6px;
}
.progress-bar {
    width: 100%;
    height: 18px;
    background: #e9ecef;
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 10px;
}
.progress-fill {
    height: 100%;
    width: 0%;
    border-radius: 999px;
}
.fill-kcal { background: #34495e; }
.fill-carb { background: #3498db; }
.fill-protein { background: #2ecc71; }
.fill-fat { background: #e74c3c; }

table {
    width: 100%;
    margin-top: 18px;
    border-collapse: collapse;
    font-size: 13px;
}
th {
    background: #2c3e50;
    color: white;
}
td, th {
    padding: 7px;
    text-align: center;
    border-bottom: 1px solid #ddd;
}
.small-btn {
    background: #e74c3c;
    border: none;
    color: white;
    padding: 4px 7px;
    border-radius: 6px;
    cursor: pointer;
}
</style>
</head>
<body>

<header>식단 관리</header>

<div class="container">
    <h3 id="userTitle"></h3>

    <input type="date" id="date">

    <input type="number" id="carb" placeholder="탄수화물 (g)">
    <input type="number" id="protein" placeholder="단백질 (g)">
    <input type="number" id="fat" placeholder="지방 (g)">
    <input type="number" id="fiber" placeholder="식이섬유 (g)">

    <button class="search-btn" onclick="goSearch()">음식 검색 (필라이즈)</button>
    <button class="add-btn" onclick="addDiet()">기록 추가</button>

    <div class="summary-card">
        <div class="summary-title">오늘 권장 섭취 기준</div>
        <div class="summary-line" id="goalModeText">저장된 목표가 없습니다.</div>
        <div class="summary-line" id="goalMacroText">권장 탄/단/지: 0 / 0 / 0g</div>
        <div class="today-kcal" id="todayTotalText">오늘 총 칼로리: 0 kcal</div>
    </div>

    <div class="progress-area">
        <div class="progress-label" id="kcalProgressText">칼로리 달성률: 0%</div>
        <div class="progress-bar"><div id="kcalFill" class="progress-fill fill-kcal"></div></div>

        <div class="progress-label" id="carbProgressText">탄수화물 달성률: 0%</div>
        <div class="progress-bar"><div id="carbFill" class="progress-fill fill-carb"></div></div>

        <div class="progress-label" id="proteinProgressText">단백질 달성률: 0%</div>
        <div class="progress-bar"><div id="proteinFill" class="progress-fill fill-protein"></div></div>

        <div class="progress-label" id="fatProgressText">지방 달성률: 0%</div>
        <div class="progress-bar"><div id="fatFill" class="progress-fill fill-fat"></div></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>날짜</th>
                <th>kcal</th>
                <th>탄</th>
                <th>단</th>
                <th>지</th>
                <th>섬유</th>
                <th>삭제</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>

    <button class="back-btn" onclick="location.href='index.html'">메인으로</button>
</div>

<script>
const currentUser = localStorage.getItem("currentUser");
const nickname = localStorage.getItem("currentNickname");

if (!currentUser || !nickname) {
    location.href = "login.html";
}

document.getElementById("userTitle").innerText = nickname + "님의 식단";

const dietKey = "diet_" + currentUser;
const goalKey = "goal_" + currentUser;

let diets = JSON.parse(localStorage.getItem(dietKey)) || [];

const today = new Date().toISOString().split("T")[0];
document.getElementById("date").value = today;

function goSearch() {
    window.open("https://www.pillyze.com/", "_blank");
}

function addDiet() {
    const date = document.getElementById("date").value;
    const carb = Number(document.getElementById("carb").value) || 0;
    const protein = Number(document.getElementById("protein").value) || 0;
    const fat = Number(document.getElementById("fat").value) || 0;
    const fiber = Number(document.getElementById("fiber").value) || 0;

    if (!date) {
        alert("날짜를 입력하세요.");
        return;
    }

    const kcal = carb * 4 + protein * 4 + fat * 9 + fiber * 2;

    diets.push({ date, carb, protein, fat, fiber, kcal });
    localStorage.setItem(dietKey, JSON.stringify(diets));

    document.getElementById("carb").value = "";
    document.getElementById("protein").value = "";
    document.getElementById("fat").value = "";
    document.getElementById("fiber").value = "";

    render();
}

function del(index) {
    diets.splice(index, 1);
    localStorage.setItem(dietKey, JSON.stringify(diets));
    render();
}

function render() {
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    diets.forEach((d, i) => {
        const row = document.createElement("tr");
        row.innerHTML = `
            <td>${d.date}</td>
            <td>${d.kcal}</td>
            <td>${d.carb}</td>
            <td>${d.protein}</td>
            <td>${d.fat}</td>
            <td>${d.fiber}</td>
            <td><button class="small-btn" onclick="del(${i})">X</button></td>
        `;
        tbody.appendChild(row);
    });

    updateGoalView();
}

function updateGoalView() {
    const goal = JSON.parse(localStorage.getItem(goalKey));
    const selectedDate = document.getElementById("date").value;

    let totalKcal = 0;
    let totalCarb = 0;
    let totalProtein = 0;
    let totalFat = 0;

    diets.forEach(d => {
        if (d.date === selectedDate) {
            totalKcal += d.kcal;
            totalCarb += d.carb;
            totalProtein += d.protein;
            totalFat += d.fat;
        }
    });

    document.getElementById("todayTotalText").innerText = "오늘 총 칼로리: " + totalKcal + " kcal";

    if (!goal) {
        document.getElementById("goalModeText").innerText = "저장된 목표가 없습니다. 내 정보에서 먼저 설정하세요.";
        document.getElementById("goalMacroText").innerText = "권장 탄/단/지: 0 / 0 / 0g";
        setProgress("kcal", 0, 0, "칼로리");
        setProgress("carb", 0, 0, "탄수화물");
        setProgress("protein", 0, 0, "단백질");
        setProgress("fat", 0, 0, "지방");
        return;
    }

    document.getElementById("goalModeText").innerText =
        "현재 목표: " + goal.goalLabel + " / " + goal.ratioLabel +
        " / 권장 " + goal.targetKcal + "kcal / 수행능력 x" + goal.fitnessFactor;

    document.getElementById("goalMacroText").innerText =
        "권장 탄/단/지: " + goal.carb + "g / " + goal.protein + "g / " + goal.fat + "g";

    setProgress("kcal", totalKcal, goal.targetKcal, "칼로리");
    setProgress("carb", totalCarb, goal.carb, "탄수화물");
    setProgress("protein", totalProtein, goal.protein, "단백질");
    setProgress("fat", totalFat, goal.fat, "지방");
}

function setProgress(type, current, target, label) {
    const fill = document.getElementById(type + "Fill");
    const text = document.getElementById(type + "ProgressText");

    let percent = 0;
    if (target > 0) {
        percent = (current / target) * 100;
    }

    const displayPercent = Math.round(percent);
    const widthPercent = Math.min(percent, 100);

    fill.style.width = widthPercent + "%";
    text.innerText = label + " 달성률: " + displayPercent + "% (" + current + " / " + target + ")";
}

document.getElementById("date").addEventListener("change", updateGoalView);

render();
</script>

</body>
</html>
