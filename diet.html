<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>식단 관리</title>

<style>
.help-btn {
    position: fixed;   /* 🔥 이게 핵심 */
    top: 15px;
    left: 15px;

    width: 28px;
    height: 28px;

    border-radius: 50%;
    background: rgba(0,0,0,0.5);

    color: white;
    font-size: 14px;
    font-weight: bold;

    display: flex;
    justify-content: center;
    align-items: center;

    z-index: 9999;
}

.help-box {
    position: fixed;   /* 🔥 이것도 */
    top: 55px;
    left: 15px;

    width: 240px;

    background: rgba(0,0,0,0.85);
    color: white;

    padding: 12px;
    border-radius: 10px;

    display: none;

    z-index: 9999;
}

body {
    margin:0;
    min-height:100vh;
    font-family:Arial;

    /* 🔥 메인페이지 스타일 배경 */
    background: url("https://images.unsplash.com/photo-1517836357463-d25dfeac3438")
    no-repeat center/cover;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* 🔥 어두운 오버레이 */
body::before {
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.65);
}

/* 🔥 메인과 동일한 카드 스타일 */
.container {
    position:relative;
    z-index:1;

    width:500px;
    padding:20px;

    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(14px);

    border-radius:20px;
    color:white;

    box-shadow:0 20px 40px rgba(0,0,0,0.5);
    animation: fadeUp 0.8s ease;
}

/* 헤더 */
header {
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    color:white;
    font-size:20px;
    font-weight:bold;
}

/* 입력 */
input, button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    box-sizing:border-box;
}

/* 입력 배경 (투명) */
input {
    background:rgba(255,255,255,0.15);
    border:none;
    color:white;
}

/* 버튼 */
button {
    border:none;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.25s;
}

button:hover {
    transform:translateY(-3px);
    box-shadow:0 6px 16px rgba(0,0,0,0.4);
}

/* 버튼 색 (메인 느낌) */
.add-btn { background:linear-gradient(135deg,#00e676,#00c853); }
.search-btn { background:linear-gradient(135deg,#ab47bc,#6a1b9a); }
.favorite-btn { background:linear-gradient(135deg,#ffb74d,#f57c00); }
.back-btn { background:linear-gradient(135deg,#42a5f5,#1565c0); }
.reset-btn { background:linear-gradient(135deg,#ef5350,#b71c1c); }

/* 즐겨찾기 */
#favoritesList button {
    width:auto;
    margin:5px 6px 0 0;
    background:#ffeaa7;
    color:#2d3436;
    border:1px solid #fdcb6e;
}

/* 진행률 */
.progress-bar {
    width:100%;
    height:18px;
    background:rgba(255,255,255,0.2);
    border-radius:10px;
    overflow:hidden;
    margin-bottom:10px;
}
.progress-fill {
    height:100%;
}
.kcal { background:#34495e; }
.carb { background:#3498db; }
.protein { background:#2ecc71; }
.fat { background:#e74c3c; }

/* 테이블 */
table {
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
    background:rgba(255,255,255,0.1);
    border-radius:10px;
    overflow:hidden;
}
th {
    background:#2c3e50;
    color:white;
}
td, th {
    padding:10px;
    text-align:center;
    border-bottom:1px solid rgba(255,255,255,0.2);
}
.small-btn {
    background:#e74c3c;
    padding:5px 8px;
    border-radius:6px;
}

/* 애니메이션 */
@keyframes fadeUp {
    from {opacity:0; transform:translateY(30px);}
    to {opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<button class="help-btn" onclick="toggleHelp()">?</button>

<div id="helpBox" class="help-box">
    임시 도움말입니다
</div>

<header>식단 관리</header>


<div class="container">

<h3 id="userTitle"></h3>

<div style="display:flex; justify-content:flex-end;">
    <button class="reset-btn" style="width:100px;" onclick="resetInputs()">초기화</button>
</div>

<input type="date" id="date">

<input type="number" id="carb" placeholder="탄수화물 (g)">
<input type="number" id="protein" placeholder="단백질 (g)">
<input type="number" id="fat" placeholder="지방 (g)">

<div id="kcalPreview" style="font-weight:bold;"></div>

<div style="display:flex; gap:8px;">
    <button class="add-btn" style="flex:1;" onclick="addDiet()">기록 추가</button>
    <button class="search-btn" style="flex:1;" onclick="goSearch()">음식 검색</button>
    <button class="favorite-btn" style="flex:1;" onclick="location.href='favorite.html'">즐겨찾기 등록</button>
</div>

<h4>📊 섭취 진행률</h4>

<div id="kcalText"></div>
<div class="progress-bar"><div id="kcalFill" class="progress-fill kcal"></div></div>

<div id="carbText"></div>
<div class="progress-bar"><div id="carbFill" class="progress-fill carb"></div></div>

<div id="proteinText"></div>
<div class="progress-bar"><div id="proteinFill" class="progress-fill protein"></div></div>

<div id="fatText"></div>
<div class="progress-bar"><div id="fatFill" class="progress-fill fat"></div></div>

<h4>⭐ 즐겨찾기</h4>
<div id="favoritesList"></div>

<table>
<thead>
<tr>
<th>날짜</th>
<th>kcal</th>
<th>탄</th>
<th>단</th>
<th>지</th>
<th>삭제</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<button class="back-btn" style="width:100%; margin-top:20px;" onclick="location.href='index.html'">
메인으로
</button>

</div>

<script>

function toggleHelp(){
    const box = document.getElementById("helpBox");
    box.style.display = box.style.display === "block" ? "none" : "block";
}

const user = localStorage.getItem("currentUser");
if(!user) location.href="login.html";

const goal = JSON.parse(localStorage.getItem("goal_"+user));

let diets = JSON.parse(localStorage.getItem("diet_"+user)) || [];
let favorites = JSON.parse(localStorage.getItem("favorites_"+user)) || [];

/* 🔥 즐겨찾기 클릭 횟수 저장 */
let favCount = {};

/* 초기화 */
function resetInputs(){
    carb.value="";
    protein.value="";
    fat.value="";
    kcalPreview.innerText="";
}

/* 검색 */
function goSearch(){
    window.open("https://www.pillyze.com/","_blank");
}

/* kcal */
function updateKcal(){
    const kcal = carb.value*4 + protein.value*4 + fat.value*9;
    kcalPreview.innerText="예상 kcal: "+(kcal||0);
}
carb.oninput=updateKcal;
protein.oninput=updateKcal;
fat.oninput=updateKcal;

/* 추가 */
function addDiet(){
    const date = document.getElementById("date").value;
    const c = +carb.value||0;
    const p = +protein.value||0;
    const f = +fat.value||0;

    const kcal = c*4+p*4+f*9;

    diets.push({date, carb:c, protein:p, fat:f, kcal});
    localStorage.setItem("diet_"+user, JSON.stringify(diets));

    /* 🔥 저장하면 즐겨찾기 카운트 초기화 */
    favCount = {};

    resetInputs();
    render();
}

/* 삭제 */
function del(i){
    diets.splice(i,1);
    localStorage.setItem("diet_"+user, JSON.stringify(diets));
    render();
}

/* 진행률 */
function setBar(type,current,target){
    const fill=document.getElementById(type+"Fill");
    const text=document.getElementById(type+"Text");

    let percent = target?(current/target*100):0;
    fill.style.width=Math.min(percent,100)+"%";

    let name="";
    if(type==="kcal") name="kcal";
    if(type==="carb") name="탄수화물";
    if(type==="protein") name="단백질";
    if(type==="fat") name="지방";

    text.innerText=`${name}: ${current}/${target} (${Math.round(percent)}%)`;
}

/* 🔥 즐겨찾기 (누적 + 개수 표시) */
function renderFavorites(){
    favoritesList.innerHTML="";

    favorites.forEach((f, idx)=>{
        const wrap = document.createElement("div");
        wrap.style.display="inline-block";
        wrap.style.marginRight="8px";

        const btn=document.createElement("button");
        btn.innerText=f.name;

        const countText = document.createElement("span");
        countText.style.marginLeft="5px";
        countText.style.fontWeight="bold";
        countText.style.color="#fff";

        btn.onclick=()=>{
            /* 값 누적 */
            carb.value = (+carb.value||0) + f.carb;
            protein.value = (+protein.value||0) + f.protein;
            fat.value = (+fat.value||0) + f.fat;
            updateKcal();

            /* 클릭 횟수 증가 */
            favCount[idx] = (favCount[idx] || 0) + 1;

            /* 개수 표시 */
            countText.innerText = favCount[idx] + "개";
        };

        wrap.appendChild(btn);
        wrap.appendChild(countText);
        favoritesList.appendChild(wrap);
    });
}

/* 렌더 */
function render(){
    tbody.innerHTML="";

    let k=0,c=0,p=0,f=0;

    diets.forEach((d,i)=>{
        k+=d.kcal; c+=d.carb; p+=d.protein; f+=d.fat;

        tbody.innerHTML+=`
        <tr>
        <td>${d.date}</td>
        <td>${d.kcal}</td>
        <td>${d.carb}</td>
        <td>${d.protein}</td>
        <td>${d.fat}</td>
        <td><button class="small-btn" onclick="del(${i})">X</button></td>
        </tr>`;
    });

    if(goal) updateProgress(k,c,p,f);
    renderFavorites();
}

/* 진행률 */
function updateProgress(kcal,carb,protein,fat){
    if(!goal) return;

    setBar("kcal",kcal,goal.targetKcal);
    setBar("carb",carb,goal.carb);
    setBar("protein",protein,goal.protein);
    setBar("fat",fat,goal.fat);
}

/* 🔥 오늘 날짜 기본값 */
document.getElementById("date").value = new Date().toISOString().split("T")[0];

render();
/* 🔥 팝업 토글 */
function toggleHelp(){
    const box = document.getElementById("helpBox");
    box.style.display = box.style.display === "block" ? "none" : "block";
}
</script>
</body>
</html>
