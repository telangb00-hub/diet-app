<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>식단 관리</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#fbc2eb,#a6c1ee);
}
header {
    background:#2c3e50;
    color:white;
    padding:15px;
    text-align:center;
}

.container {
    width:500px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 10px 24px rgba(0,0,0,0.12);
}

input, button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    box-sizing:border-box;
}

button {
    border:none;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.add-btn { background:#27ae60; }
.search-btn { background:#8e44ad; }
.favorite-btn { background:#f39c12; }
.back-btn { background:#3498db; }
.reset-btn { background:#e67e22; }

/* 즐겨찾기 */
#favoritesList button {
    width:auto;
    margin:5px 6px 0 0;
    background:#ffeaa7;
    color:#2d3436;
    border:1px solid #fdcb6e;
    font-weight:bold;
}

/* 진행률 */
.progress-bar {
    width:100%;
    height:18px;
    background:#eee;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:10px;
}
.progress-fill {
    height:100%;
}
.kcal { background:#34495e; }
.carb { background:#3498db; }
.protein { background:#2ecc71; }
.fat { background:#e74c3c; }

/* 테이블 */
table {
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}
th {
    background:#2c3e50;
    color:white;
}
td, th {
    padding:10px;
    text-align:center;
    border-bottom:1px solid #ddd;
}
.small-btn {
    background:#e74c3c;
    padding:5px 8px;
    border-radius:6px;
}
</style>
</head>

<body>

<header>식단 관리</header>

<div class="container">

<h3 id="userTitle"></h3>

<!-- 초기화 -->
<div style="display:flex; justify-content:flex-end;">
    <button class="reset-btn" style="width:100px;" onclick="resetInputs()">초기화</button>
</div>

<!-- 날짜 -->
<input type="date" id="date">

<!-- 입력 -->
<input type="number" id="carb" placeholder="탄수화물 (g)">
<input type="number" id="protein" placeholder="단백질 (g)">
<input type="number" id="fat" placeholder="지방 (g)">

<div id="kcalPreview" style="font-weight:bold;"></div>

<!-- 🔥 버튼 3개 정렬 -->
<div style="display:flex; gap:8px;">
    <button class="add-btn" style="flex:1;" onclick="addDiet()">기록 추가</button>
    <button class="search-btn" style="flex:1;" onclick="goSearch()">음식 검색</button>
    <button class="favorite-btn" style="flex:1;" onclick="location.href='favorite.html'">즐겨찾기 등록</button>
</div>

<!-- 진행률 -->
<h4>📊 섭취 진행률</h4>

<div id="kcalText"></div>
<div class="progress-bar"><div id="kcalFill" class="progress-fill kcal"></div></div>

<div id="carbText"></div>
<div class="progress-bar"><div id="carbFill" class="progress-fill carb"></div></div>

<div id="proteinText"></div>
<div class="progress-bar"><div id="proteinFill" class="progress-fill protein"></div></div>

<div id="fatText"></div>
<div class="progress-bar"><div id="fatFill" class="progress-fill fat"></div></div>

<!-- 즐겨찾기 -->
<h4>⭐ 즐겨찾기</h4>
<div id="favoritesList"></div>

<!-- 테이블 -->
<table>
<thead>
<tr>
<th>날짜</th>
<th>kcal</th>
<th>탄</th>
<th>단</th>
<th>지</th>
<th>삭제</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<!-- 메인 -->
<button class="back-btn" style="width:100%; margin-top:20px;" onclick="location.href='index.html'">
메인으로
</button>

</div>

<script>
const user = localStorage.getItem("currentUser");
if(!user) location.href="login.html";

const goal = JSON.parse(localStorage.getItem("goal_"+user));

let diets = JSON.parse(localStorage.getItem("diet_"+user)) || [];
let favorites = JSON.parse(localStorage.getItem("favorites_"+user)) || [];

document.getElementById("userTitle").innerText = user+"님의 식단";

// 초기화
function resetInputs(){
    carb.value="";
    protein.value="";
    fat.value="";
    kcalPreview.innerText="";
}

// 음식 검색
function goSearch(){
    window.open("https://www.pillyze.com/","_blank");
}

// kcal 계산
function updateKcal(){
    const kcal = carb.value*4 + protein.value*4 + fat.value*9;
    kcalPreview.innerText="예상 kcal: "+(kcal||0);
}
carb.oninput=updateKcal;
protein.oninput=updateKcal;
fat.oninput=updateKcal;

// 추가
function addDiet(){
    const date = document.getElementById("date").value;
    const c = +carb.value||0;
    const p = +protein.value||0;
    const f = +fat.value||0;

    const kcal = c*4+p*4+f*9;

    diets.push({date, carb:c, protein:p, fat:f, kcal});
    localStorage.setItem("diet_"+user, JSON.stringify(diets));

    resetInputs();
    render();
}

// 삭제
function del(i){
    diets.splice(i,1);
    localStorage.setItem("diet_"+user, JSON.stringify(diets));
    render();
}

// 진행률
function updateProgress(kcal,carb,protein,fat){
    if(!goal) return;

    setBar("kcal",kcal,goal.targetKcal);
    setBar("carb",carb,goal.carb);
    setBar("protein",protein,goal.protein);
    setBar("fat",fat,goal.fat);
}

function setBar(type,current,target){
    const fill=document.getElementById(type+"Fill");
    const text=document.getElementById(type+"Text");

    let percent = target?(current/target*100):0;

    fill.style.width=Math.min(percent,100)+"%";
    text.innerText=`${type}: ${current}/${target} (${Math.round(percent)}%)`;
}

// 즐겨찾기
function renderFavorites(){
    favoritesList.innerHTML="";
    favorites.forEach(f=>{
        const btn=document.createElement("button");
        btn.innerText=f.name;

        btn.onclick=()=>{
            carb.value=f.carb;
            protein.value=f.protein;
            fat.value=f.fat;
            updateKcal();
        };

        favoritesList.appendChild(btn);
    });
}

// 렌더
function render(){
    tbody.innerHTML="";

    let k=0,c=0,p=0,f=0;

    diets.forEach((d,i)=>{
        k+=d.kcal; c+=d.carb; p+=d.protein; f+=d.fat;

        tbody.innerHTML+=`
        <tr>
        <td>${d.date}</td>
        <td>${d.kcal}</td>
        <td>${d.carb}</td>
        <td>${d.protein}</td>
        <td>${d.fat}</td>
        <td><button class="small-btn" onclick="del(${i})">X</button></td>
        </tr>`;
    });

    updateProgress(k,c,p,f);
    renderFavorites();
}

render();
</script>

</body>
</html>
