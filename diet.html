<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>식단 관리</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#fbc2eb,#a6c1ee);
}
header {
    background:#2c3e50;
    color:white;
    padding:15px;
    text-align:center;
}

.container {
    width:500px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:16px;
    box-shadow:0 10px 24px rgba(0,0,0,0.12);
}

input, button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    box-sizing:border-box;
}

button {
    border:none;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.add-btn { background:#27ae60; }
.search-btn { background:#8e44ad; }
.favorite-btn { background:#f39c12; }
.back-btn { background:#3498db; }
.reset-btn { background:#e67e22; }

/* 즐겨찾기 */
.fav-row{
    display:flex;
    gap:6px;
    margin-top:6px;
}
.qty{ width:60px; }

/* 테이블 */
table {
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}
th {
    background:#2c3e50;
    color:white;
}
td, th {
    padding:10px;
    text-align:center;
    border-bottom:1px solid #ddd;
}
.small-btn {
    background:#e74c3c;
    padding:5px 8px;
    border-radius:6px;
}
</style>
</head>

<body>

<header>식단 관리</header>

<div class="container">

<h3 id="userTitle"></h3>

<button class="reset-btn" onclick="resetInputs()">초기화</button>

<!-- 날짜 -->
<input type="date" id="date">

<!-- 🔥 날짜 조회 -->
<input type="date" id="filterDate">
<button onclick="filterByDate()">날짜별 조회</button>

<!-- 입력 (세로 정렬) -->
<input type="number" id="carb" placeholder="탄수화물 (g)">
<input type="number" id="protein" placeholder="단백질 (g)">
<input type="number" id="fat" placeholder="지방 (g)">

<div id="kcalPreview"></div>

<button class="add-btn" onclick="addDiet()">기록 추가</button>
<button class="search-btn" onclick="goSearch()">음식 검색</button>
<button class="favorite-btn" onclick="location.href='favorite.html'">즐겨찾기 등록</button>

<h4>⭐ 즐겨찾기</h4>
<div id="favoritesList"></div>

<table>
<thead>
<tr>
<th>날짜</th>
<th>칼로리</th>
<th>탄수화물</th>
<th>단백질</th>
<th>지방</th>
<th>삭제</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<button class="back-btn" onclick="location.href='index.html'">메인으로</button>

</div>

<script>
const user = localStorage.getItem("currentUser");
if(!user) location.href="login.html";

let diets = JSON.parse(localStorage.getItem("diet_"+user)) || [];
let favorites = JSON.parse(localStorage.getItem("favorites_"+user)) || [];

userTitle.innerText = user+"님의 식단";

/* 🔥 오늘 날짜 자동 설정 */
const today = new Date().toISOString().split("T")[0];
document.getElementById("date").value = today;

/* kcal 계산 */
function updateKcal(){
    const kcal = carb.value*4 + protein.value*4 + fat.value*9;
    kcalPreview.innerText="예상 kcal: "+(kcal||0);
}
carb.oninput=updateKcal;
protein.oninput=updateKcal;
fat.oninput=updateKcal;

/* 기록 추가 */
function addDiet(){
    const date = document.getElementById("date").value || today;

    const c = +carb.value||0;
    const p = +protein.value||0;
    const f = +fat.value||0;

    const kcal = c*4+p*4+f*9;

    diets.push({date, carb:c, protein:p, fat:f, kcal});
    localStorage.setItem("diet_"+user, JSON.stringify(diets));

    resetInputs();
    render();
}

/* 초기화 */
function resetInputs(){
    carb.value=""; protein.value=""; fat.value="";
    kcalPreview.innerText="";
}

/* 날짜 필터 */
function filterByDate(){
    const d = document.getElementById("filterDate").value;
    render(d);
}

/* 삭제 */
function del(i){
    diets.splice(i,1);
    localStorage.setItem("diet_"+user, JSON.stringify(diets));
    render();
}

/* 즐겨찾기 */
function renderFavorites(){
    favoritesList.innerHTML="";

    favorites.forEach((f,i)=>{
        const row=document.createElement("div");
        row.className="fav-row";

        const btn=document.createElement("button");
        btn.innerText=f.name;

        const qty=document.createElement("input");
        qty.type="number"; qty.value=1; qty.className="qty";

        const add=document.createElement("button");
        add.innerText="+";
        add.onclick=()=>{
            const q=Number(qty.value)||1;
            carb.value=f.carb*q;
            protein.value=f.protein*q;
            fat.value=f.fat*q;
            updateKcal();
        };

        const delBtn=document.createElement("button");
        delBtn.innerText="X";
        delBtn.onclick=()=>{
            favorites.splice(i,1);
            localStorage.setItem("favorites_"+user, JSON.stringify(favorites));
            renderFavorites();
        };

        row.append(btn,qty,add,delBtn);
        favoritesList.appendChild(row);
    });
}

/* 렌더 */
function render(filterDate=null){
    tbody.innerHTML="";

    let list = diets;
    if(filterDate){
        list = diets.filter(d=>d.date===filterDate);
    }

    list.forEach((d,i)=>{
        tbody.innerHTML+=`
        <tr>
        <td>${d.date}</td>
        <td>${d.kcal}</td>
        <td>${d.carb}</td>
        <td>${d.protein}</td>
        <td>${d.fat}</td>
        <td><button class="small-btn" onclick="del(${i})">X</button></td>
        </tr>`;
    });

    renderFavorites();
}

render();
</script>

</body>
</html>
